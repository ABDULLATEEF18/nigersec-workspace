spring:
  application:
    name: intelligence-backend

  datasource:
    url: ${DB_URL:jdbc:h2:mem:nigersec;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.h2.Driver}
    hikari:
      connection-timeout: 10000
      initialization-fail-timeout: 30000

  jackson:
    serialization:
      write-dates-as-timestamps: false   # serialize Instant/LocalDate as ISO-8601 strings
    deserialization:
      fail-on-unknown-properties: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Don't block the app thread if Kafka is temporarily unavailable
      properties:
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 10000
    consumer:
      group-id: nigersec-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.nigersec.*"
    listener:
      missing-topics-fatal: false   # don't crash if topics don't exist yet on first boot

server:
  port: 8080
  servlet:
    context-path: /api/v1

nigersec:
  cors:
    allowed-origins:
      - "http://localhost:5173"
      - "http://localhost:3000"
      - "${FRONTEND_URL:}"
  jwt:
    secret: ${JWT_SECRET:nigersec-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  rate-limit:
    citizen-queries-per-hour: 10
    api-calls-per-minute: 100
  dark-web:
    api-key: ccd9727faamsh9c20e75cfc7643bp17f29bjsn173d28c296d3
    base-url: ${DARK_WEB_API_URL:https://breachdirectory.p.rapidapi.com}
  fraud:
    risk-threshold-medium: 40
    risk-threshold-high: 70

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false
    kafka:
      enabled: false

logging:
  level:
    com.nigersec: DEBUG
    org.springframework.security: INFO
    org.springframework.kafka: WARN
